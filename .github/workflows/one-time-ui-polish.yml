name: One-time Benly UI polish

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/one-time-ui-polish.yml'

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply UI polish
        shell: python
        run: |
          from pathlib import Path

          rich = Path('src/main/java/jp/ryozora/lineassistant/RichMenuSetupService.java')
          text = rich.read_text(encoding='utf-8')
          replacements = {
              'private static final String MENU_NAME = "Benly Main v5 日本語";':
                  'private static final String MENU_NAME = "Benly Main v6 UI改善";',
              'body.put("chatBarText", "ベンリーを開く");':
                  'body.put("chatBarText", "ベンリーメニュー");',
              '                    "予定・天気", "メモ・やること", "家計簿・買うもの",\n                    "習慣・ミッション", "お知らせの切替", "メインメニュー"':
                  '                    "予定・天気", "メモ・タスク", "家計簿・買い物",\n                    "習慣・成長", "通知の切替", "ホーム"',
              '''                g.setColor(Color.WHITE);
                g.fillRoundRect(centerX - 70, y + cellHeight - 135, 140, 58, 30, 30);
                g.setColor(accents[index]);
                Font tapFont = new Font(fontFamily, Font.BOLD, 31);
                drawCenteredFit(g, "タップ", tapFont, centerX - 70, y + cellHeight - 94, 140, 22);
''': ''
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'RichMenuSetupService: expected text not found: {old[:80]!r}')
              text = text.replace(old, new)
          rich.write_text(text, encoding='utf-8')

          controller = Path('src/main/java/jp/ryozora/lineassistant/LineWebhookController.java')
          text = controller.read_text(encoding='utf-8')
          replacements = {
              'button("ホームへ", "ホーム", "#8E9CB3")':
                  'button("🏠 ホーム", "ホーム", "#8E9CB3")',
              'text("今日の確認とスケジュール管理", "sm", "regular", "#526D82", "center")':
                  'text("予定と今日の確認", "sm", "regular", "#526D82", "center")',
              'text("覚えておくことと、やること", "sm", "regular", "#52776C", "center")':
                  'text("メモとやること", "sm", "regular", "#52776C", "center")',
              'text("支出と買うものをまとめて確認", "sm", "regular", "#52776C", "center")':
                  'text("支出と買い物", "sm", "regular", "#52776C", "center")',
              'text("続けることとベンリーの成長", "sm", "regular", "#6D6287", "center")':
                  'text("習慣と成長", "sm", "regular", "#6D6287", "center")',
              'text("今日・予定", "xl", "bold", "#334E68", "center")':
                  'text("今日・予定", "xl", "bold", "#2E6FC4", "center")',
              'text("メモ・タスク", "xl", "bold", "#315D50", "center")':
                  'text("メモ・タスク", "xl", "bold", "#2E9B6B", "center")',
              'text("お金・買い物", "xl", "bold", "#315D50", "center")':
                  'text("お金・買い物", "xl", "bold", "#D88916", "center")',
              'text("習慣・成長", "xl", "bold", "#4D426B", "center")':
                  'text("習慣・成長", "xl", "bold", "#7957C7", "center")',
              'row.put("spacing", "sm");':
                  'row.put("spacing", "md");'
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'LineWebhookController: expected text not found: {old[:80]!r}')
              text = text.replace(old, new)
          controller.write_text(text, encoding='utf-8')

          Path('.github/workflows/one-time-ui-polish.yml').unlink()

      - name: Commit UI polish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "リッチメニューとカテゴリUIを見やすく改善"
          git push
